<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seat Manager</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <main class="mx-auto min-h-screen w-full max-w-6xl p-4 sm:p-6 lg:p-10">
      <section class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-xl">
        <header class="border-b border-slate-200 bg-slate-900 px-6 py-5 text-slate-100">
          <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">Cinema Seat Manager</h1>
          <p class="mt-2 text-sm text-slate-300">Click any available seat to reserve it.</p>
        </header>

        <div class="grid gap-6 p-6 lg:grid-cols-[2fr_1fr]">
          <section>
            <div class="mb-4 flex items-center justify-between rounded-xl bg-slate-50 px-4 py-3">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Screen</p>
              <p class="text-xs text-slate-500">Rows 1-8, Seats 1-10</p>
            </div>

            <div class="mb-2 grid grid-cols-[2rem_repeat(10,minmax(0,1fr))] gap-1 sm:gap-2">
              <span class="text-xs"></span>
              <span class="text-center text-xs font-medium text-slate-500">1</span>
              <span class="text-center text-xs font-medium text-slate-500">2</span>
              <span class="text-center text-xs font-medium text-slate-500">3</span>
              <span class="text-center text-xs font-medium text-slate-500">4</span>
              <span class="text-center text-xs font-medium text-slate-500">5</span>
              <span class="text-center text-xs font-medium text-slate-500">6</span>
              <span class="text-center text-xs font-medium text-slate-500">7</span>
              <span class="text-center text-xs font-medium text-slate-500">8</span>
              <span class="text-center text-xs font-medium text-slate-500">9</span>
              <span class="text-center text-xs font-medium text-slate-500">10</span>
            </div>

            <div id="seat-grid" class="space-y-2"></div>
          </section>

          <aside class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <h2 class="text-lg font-semibold text-slate-900">Status</h2>

            <div class="mt-4 space-y-2 text-sm text-slate-700">
              <p id="counts">Occupied: 0 | Available: 80</p>
              <p id="adjacent-message" class="font-medium text-emerald-700"></p>
              <p id="action-message" class="font-medium text-slate-800"></p>
            </div>

            <div class="mt-6 space-y-2 text-sm">
              <p class="flex items-center gap-2">
                <span class="inline-flex h-5 w-5 items-center justify-center rounded bg-emerald-100 text-emerald-700">L</span>
                Available
              </p>
              <p class="flex items-center gap-2">
                <span class="inline-flex h-5 w-5 items-center justify-center rounded bg-rose-100 text-rose-700">X</span>
                Occupied
              </p>
              <p class="flex items-center gap-2">
                <span class="inline-flex h-5 w-5 items-center justify-center rounded bg-amber-100 text-amber-700">A</span>
                Adjacent suggestion
              </p>
            </div>

            <div class="mt-6">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Preset Scenarios</p>
              <div class="mt-2 grid grid-cols-2 gap-2">
                <button
                  id="preset-empty"
                  class="rounded-md border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:bg-slate-100"
                  type="button"
                >
                  Empty
                </button>
                <button
                  id="preset-partial"
                  class="rounded-md border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:bg-slate-100"
                  type="button"
                >
                  Partial
                </button>
                <button
                  id="preset-nearly-full"
                  class="rounded-md border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:bg-slate-100"
                  type="button"
                >
                  Nearly Full
                </button>
                <button
                  id="preset-full"
                  class="rounded-md border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:bg-slate-100"
                  type="button"
                >
                  Full
                </button>
              </div>
            </div>

            <button
              id="reset-button"
              class="mt-6 w-full rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
              type="button"
            >
              Reset Room
            </button>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="/src/ui.ts"></script>
  </body>
</html>
